<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --paper: #F5F1E8;
      --paper-2: #EFE9DB;
      --ink: #2A2622;
      --ink-soft: #6B6357;
      --rule: #DAD2C2;
      --accent: #3A5A40;
      --accent-soft: #E7EBE3;
      --danger: #8A3B2E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }

    .hero { text-align: center; margin-bottom: 48px; }
    .hero .eyebrow {
      font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); font-weight: 600; margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'Fraunces', serif; font-weight: 500;
      font-size: 44px; line-height: 1.1; letter-spacing: -0.01em;
      margin-bottom: 14px;
    }
    .hero p { font-size: 17px; color: var(--ink-soft); max-width: 460px; margin: 0 auto; }

    .card {
      background: #FBF8F1; border: 1px solid var(--rule);
      border-radius: 14px; padding: 28px;
      margin-bottom: 24px;
    }
    .card h2 {
      font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px;
      margin-bottom: 4px;
    }
    .card .sub { font-size: 14px; color: var(--ink-soft); margin-bottom: 20px; }

    .drop {
      border: 1.5px dashed var(--rule); border-radius: 10px;
      padding: 32px 20px; text-align: center; cursor: pointer;
      transition: border-color .18s, background .18s;
      background: var(--paper);
    }
    .drop:hover, .drop.over { border-color: var(--accent); background: var(--accent-soft); }
    .drop .icon { font-size: 26px; margin-bottom: 8px; }
    .drop .main { font-weight: 500; font-size: 15px; }
    .drop .hint { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }
    input[type=file] { display: none; }

    .filepill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-soft); color: var(--accent);
      border-radius: 999px; padding: 6px 14px; font-size: 13px; font-weight: 500;
      margin-top: 16px;
    }

    .askrow { display: flex; gap: 10px; }
    input[type=text] {
      flex: 1; border: 1px solid var(--rule); border-radius: 10px;
      padding: 13px 15px; font-size: 15px; font-family: inherit;
      background: var(--paper); color: var(--ink);
    }
    input[type=text]:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    button {
      border: none; border-radius: 10px; padding: 0 22px;
      background: var(--accent); color: #fff; font-family: inherit;
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: opacity .15s;
    }
    button:hover:not(:disabled) { opacity: .9; }
    button:disabled { opacity: .45; cursor: default; }

    .answer {
      margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--rule);
      animation: rise .35s ease;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(6px);} to { opacity:1; transform:none;} }
    .answer .q { font-size: 14px; color: var(--ink-soft); margin-bottom: 10px; }
    .answer .q b { color: var(--ink); font-weight: 600; }
    .answer .a {
      font-family: 'Fraunces', serif; font-size: 19px; line-height: 1.65;
      white-space: pre-wrap;
    }
    .sources { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .sources .lbl { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); margin-right: 4px; }
    .chip {
      font-size: 12px; background: var(--paper); border: 1px solid var(--rule);
      border-radius: 6px; padding: 4px 9px; color: var(--ink-soft);
    }

    .status { font-size: 14px; margin-top: 14px; }
    .status.err { color: var(--danger); }
    .status.ok { color: var(--accent); }
    .spinner {
      display: inline-block; width: 15px; height: 15px; vertical-align: -2px;
      border: 2px solid var(--rule); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg);} }

    .foot { text-align: center; margin-top: 40px; font-size: 13px; color: var(--ink-soft); }
    .disabled-note { font-size: 13px; color: var(--ink-soft); margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;
    const API = "http://127.0.0.1:8000";

    function App() {
      const [file, setFile] = useState(null);
      const [uploadState, setUploadState] = useState({ status: "idle", msg: "" });
      const [question, setQuestion] = useState("");
      const [asking, setAsking] = useState(false);
      const [result, setResult] = useState(null);
      const [askErr, setAskErr] = useState("");
      const [over, setOver] = useState(false);
      const fileInput = useRef(null);

      const hasUploaded = uploadState.status === "done";

      async function handleFile(f) {
        if (!f) return;
        if (!f.name.toLowerCase().endsWith(".pdf")) {
          setUploadState({ status: "error", msg: "That's not a PDF. Please choose a .pdf file." });
          return;
        }
        setFile(f);
        setUploadState({ status: "uploading", msg: "" });
        const form = new FormData();
        form.append("file", f);
        try {
          const res = await fetch(API + "/upload", { method: "POST", body: form });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Upload failed");
          setUploadState({ status: "done", msg: `Ready — ${data.chunks_stored} passages indexed from ${data.pages_extracted} page${data.pages_extracted > 1 ? "s" : ""}.` });
        } catch (e) {
          setUploadState({ status: "error", msg: e.message });
        }
      }

      async function ask() {
        const q = question.trim();
        if (!q) return;
        setAsking(true);
        setAskErr("");
        setResult(null);
        try {
          const res = await fetch(API + "/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Something went wrong");
          setResult(data);
        } catch (e) {
          setAskErr(e.message);
        } finally {
          setAsking(false);
        }
      }

      const uniquePages = result
        ? [...new Set(result.sources.map(s => s.page))]
        : [];

      return (
        <div className="wrap">
          <div className="hero">
            <div className="eyebrow">DocuChat</div>
            <h1>Welcome to DocuChat</h1>
            <p>Upload any PDF document and ask away. Answers come straight from your file, with the pages they came from.</p>
          </div>

          <div className="card">
            <h2>Your document</h2>
            <div className="sub">PDF files with selectable text work best.</div>
            <div
              className={"drop" + (over ? " over" : "")}
              onClick={() => fileInput.current.click()}
              onDragOver={(e) => { e.preventDefault(); setOver(true); }}
              onDragLeave={() => setOver(false)}
              onDrop={(e) => { e.preventDefault(); setOver(false); handleFile(e.dataTransfer.files[0]); }}
            >
              <div className="icon">📄</div>
              <div className="main">Drop a PDF here, or click to choose</div>
              <div className="hint">Your resume, a paper, a contract — anything.</div>
            </div>
            <input ref={fileInput} type="file" accept=".pdf" onChange={(e) => handleFile(e.target.files[0])} />

            {file && uploadState.status !== "error" && (
              <div className="filepill">📎 {file.name}</div>
            )}
            {uploadState.status === "uploading" && (
              <div className="status"><span className="spinner"></span>Reading and indexing your document…</div>
            )}
            {uploadState.status === "done" && (
              <div className="status ok">{uploadState.msg}</div>
            )}
            {uploadState.status === "error" && (
              <div className="status err">{uploadState.msg}</div>
            )}
          </div>

          <div className="card">
            <h2>Ask a question</h2>
            <div className="sub">Try “What experience does this person have?” or “Summarize the main points.”</div>
            <div className="askrow">
              <input
                type="text"
                placeholder="Ask something about your document…"
                value={question}
                onChange={(e) => setQuestion(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") ask(); }}
              />
              <button onClick={ask} disabled={asking || !question.trim()}>
                {asking ? "Asking…" : "Ask"}
              </button>
            </div>
            {!hasUploaded && (
              <div className="disabled-note">Tip: upload a document first, then ask. If you've uploaded before, your documents are still saved.</div>
            )}

            {askErr && <div className="status err">{askErr}</div>}

            {result && (
              <div className="answer">
                <div className="q">You asked: <b>{result.question}</b></div>
                <div className="a">{result.answer}</div>
                {uniquePages.length > 0 && (
                  <div className="sources">
                    <span className="lbl">Sources</span>
                    {uniquePages.map(p => (
                      <span className="chip" key={p}>page {p}</span>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="foot">Answers are drawn only from your uploaded document.</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
